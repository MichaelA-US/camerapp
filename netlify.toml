[build]
  command = "echo 'No build step'"
  publish = "public"

[build.environment]
  # These are non-secret config values that can appear in source/docs.
  # Keep real credentials (APP_PASSWORD, TOKEN_SECRET, S3_* keys) scanned.
  SECRETS_SCAN_OMIT_KEYS = "PORT,METADATA_BACKEND,METADATA_PREFIX,S3_REGION,S3_BUCKET"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["express", "dotenv", "@aws-sdk/client-s3", "@aws-sdk/s3-request-presigner", "serverless-http"]

[[redirects]]
  from = "/camera"
  to = "/camera/"
  status = 301

[[redirects]]
  from = "/camera/"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: https: blob:; connect-src 'self' https://*.r2.cloudflarestorage.com; media-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

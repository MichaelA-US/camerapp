<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Camera Upload</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <div class="app-shell">
        <section class="panel">
          <h1>Cloud Camera</h1>
          <p class="subtitle">Capture and upload directly to cloud storage.</p>

          <form id="login-form" class="login-form">
            <label for="passcode">Passcode</label>
            <input id="passcode" type="password" autocomplete="current-password" required />
            <button type="submit">Unlock Camera</button>
          </form>

          <div class="camera-wrap">
            <video id="preview" playsinline autoplay muted></video>
            <canvas id="capture-canvas" hidden></canvas>
          </div>

          <div class="controls">
            <button id="capture" disabled>Take Photo</button>
            <button id="flip-camera" disabled>Flip Camera</button>
          </div>

          <p id="status">Locked. Enter passcode to start.</p>
        </section>

        <aside class="album-panel">
          <h2 class="album-title">Album</h2>
          <p class="album-subtitle">Latest photos from this session.</p>
          <div id="album-grid" class="album-grid"></div>
        </aside>
      </div>

      <div id="preview-modal" class="preview-modal" hidden>
        <div class="preview-backdrop" id="preview-backdrop"></div>
        <div class="preview-content" role="dialog" aria-modal="true" aria-label="Photo preview">
          <button id="preview-close" class="preview-close" type="button" aria-label="Close preview">
            Close
          </button>
          <img id="preview-image" class="preview-image" alt="Photo preview" />
        </div>
      </div>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>

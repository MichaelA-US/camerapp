<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Camera Upload</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <div class="app-shell">
        <section class="panel">
          <h1>Cloud Camera</h1>
          <p class="subtitle">Capture and upload directly to cloud storage.</p>

          <form id="login-form" class="login-form">
            <label for="username">Username</label>
            <input id="username" type="text" autocomplete="username" required maxlength="40" />
            <label for="password">Password</label>
            <input id="password" type="password" autocomplete="current-password" required />
            <button type="submit">Sign In</button>
          </form>

          <div class="session-row">
            <span id="session-user">Not signed in</span>
            <button id="logout-button" type="button" disabled>Log Out</button>
          </div>

          <div class="upload-options">
            <label for="album-name">Album</label>
            <input id="album-name" type="text" maxlength="50" value="general" />
            <label class="check-row" for="public-toggle">
              <input id="public-toggle" type="checkbox" />
              <span>Make uploads public</span>
            </label>
          </div>

          <div class="camera-wrap">
            <video id="preview" playsinline autoplay muted></video>
            <canvas id="capture-canvas" hidden></canvas>
          </div>

          <div class="controls">
            <button id="capture" disabled>Take Photo</button>
            <button id="flip-camera" disabled>Flip Camera</button>
          </div>
          <div class="controls">
            <button id="upload-files" disabled>Upload From Device</button>
            <input id="file-picker" type="file" accept="image/*" multiple hidden />
          </div>

          <p id="status">Locked. Sign in to start.</p>

          <section id="admin-panel" class="admin-panel" hidden>
            <h2 class="admin-title">Admin Panel</h2>
            <p class="admin-subtitle">Create users and control shared album access.</p>

            <form id="create-user-form" class="create-user-form">
              <label for="new-user-username">New username</label>
              <input id="new-user-username" type="text" maxlength="40" autocomplete="off" />
              <label for="new-user-password">New user password</label>
              <input id="new-user-password" type="password" maxlength="128" autocomplete="off" />
              <label for="new-user-role">Role</label>
              <select id="new-user-role">
                <option value="user">User</option>
                <option value="admin">Admin</option>
              </select>
              <button type="submit">Create User</button>
            </form>

            <p id="admin-status" class="admin-status"></p>
            <div id="admin-users-list" class="admin-users-list"></div>
          </section>
        </section>

        <aside class="album-panel">
          <h2 class="album-title">Album</h2>
          <p class="album-subtitle">Browse uploaded photos by album.</p>
          <div class="album-filters">
            <label for="owner-filter">View User</label>
            <select id="owner-filter">
              <option value="">All visible users</option>
            </select>
            <label for="album-filter">View Album</label>
            <select id="album-filter">
              <option value="">All albums</option>
            </select>
            <label class="check-row" for="public-only-filter">
              <input id="public-only-filter" type="checkbox" />
              <span>Public only</span>
            </label>
          </div>
          <div id="album-grid" class="album-grid"></div>
        </aside>
      </div>

      <div id="preview-modal" class="preview-modal" hidden>
        <div class="preview-backdrop" id="preview-backdrop"></div>
        <div class="preview-content" role="dialog" aria-modal="true" aria-label="Photo preview">
          <button id="preview-close" class="preview-close" type="button" aria-label="Close preview">
            Close
          </button>
          <img id="preview-image" class="preview-image" alt="Photo preview" />
        </div>
      </div>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
